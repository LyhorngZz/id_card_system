services:

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Hello@123
      MYSQL_DATABASE: A-Hun_Lyhorng-db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  springboot:
    build: .
    container_name: springboot-app
    restart: always

    depends_on:
      - mysql

    expose:
      - "8081"

  nginx:
    image: nginx:latest
    container_name: nginx-web

    depends_on:
      - springboot

    ports:
      - "8080:8080"
      - "8443:8443"
      - "2222:2222"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

volumes:
  mysql_data:
