<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ID Card Preview</title>
    <style>
        .card{
            width:400px;
            border:2px solid black;
            padding:20px;
            margin:20px auto;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>ID CARD PREVIEW</h2>

    <p><b>Name:</b> <span th:text="${profile.fullName}"></span></p>

    <p><b>Department:</b> <span th:text="${profile.department}"></span></p>

    <p><b>Registration:</b> <span th:text="${profile.registrationNumber}"></span></p>

    <p><b>Title:</b> <span th:text="${profile.title}"></span></p>
</div>

</body>
</html>
