<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>ID Card</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body style="background:#eef2f7;">

<div class="container mt-5">

    <div class="row">

        <!-- CARD -->

        <div class="col-md-6">

            <div class="card shadow-sm p-4">

                <h2>ID Card</h2>

                <div class="mt-3"
                     style="
                     border-radius:20px;
                     overflow:hidden;
                     background:white;">

                    <!-- HEADER -->

                    <div style="
                    background:#0f766e;
                    color:white;
                    text-align:center;
                    padding:20px;">

                        <h4>ORDERZONE CORP</h4>

                        <small>
                            Building the Future
                        </small>

                        <br>

                        <span class="badge bg-light text-dark mt-2">

                            <span th:text="${profile.type}">
                                STUDENT
                            </span>

                            ID

                        </span>

                    </div>

                    <!-- BODY -->

                    <div class="p-4">

                        <div class="row">

                            <div class="col-4">

                                <div style="
                                width:90px;
                                height:110px;
                                border:1px dashed #ccc;
                                display:flex;
                                align-items:center;
                                justify-content:center;">

                                    No Photo

                                </div>

                            </div>

                            <div class="col-8">

                                <h4 th:text="${profile.fullName}">
                                    Full Name
                                </h4>

                                <small
                                        th:text="${profile.title}">
                                    Student
                                </small>

                                <table class="table table-sm mt-2">

                                    <tr>
                                        <td>ID No.</td>
                                        <td th:text="${profile.registrationNumber}">
                                        </td>
                                    </tr>

                                    <tr>
                                        <td>Dept.</td>
                                        <td th:text="${profile.department}">
                                        </td>
                                    </tr>

                                    <tr>
                                        <td>Blood</td>
                                        <td th:text="${profile.bloodGroup}">
                                        </td>
                                    </tr>

                                    <tr>
                                        <td>Valid</td>
                                        <td th:text="${profile.expiryDate}">
                                        </td>
                                    </tr>

                                </table>

                            </div>

                        </div>

                        <!-- QR -->

                        <div class="text-center mt-3">

                            <div style="
                            width:120px;
                            height:120px;
                            border:1px dashed #ccc;
                            margin:auto;
                            display:flex;
                            align-items:center;
                            justify-content:center;">

                                QR

                            </div>

                        </div>

                        <!-- BARCODE -->

                        <div class="mt-3">

                            <div style="
                            height:60px;
                            border:1px dashed #ccc;
                            display:flex;
                            align-items:center;
                            justify-content:center;">

                                BARCODE

                            </div>

                        </div>

                    </div>

                    <!-- FOOTER -->

                    <div style="
                    background:#0f766e;
                    color:white;
                    text-align:center;
                    padding:8px;
                    font-size:12px;">

                        Verify:
                        <span th:text="${profile.uuid}">
                        </span>

                    </div>

                </div>

            </div>

        </div>

        <!-- DETAILS -->

        <div class="col-md-6">

            <div class="card shadow-sm p-4">

                <h3>Details</h3>

                <table class="table">

                    <tr>
                        <th>Registration</th>
                        <td th:text="${profile.registrationNumber}">
                        </td>
                    </tr>

                    <tr>
                        <th>UUID</th>
                        <td th:text="${profile.uuid}">
                        </td>
                    </tr>

                    <tr>
                        <th>Type</th>
                        <td th:text="${profile.type}">
                        </td>
                    </tr>

                    <tr>
                        <th>Name</th>
                        <td th:text="${profile.fullName}">
                        </td>
                    </tr>

                    <tr>
                        <th>Department</th>
                        <td th:text="${profile.department}">
                        </td>
                    </tr>

                    <tr>
                        <th>Title</th>
                        <td th:text="${profile.title}">
                        </td>
                    </tr>

                    <tr>
                        <th>Email</th>
                        <td th:text="${profile.email}">
                        </td>
                    </tr>

                </table>

                <div class="mt-3">

                    <a href="#"
                       class="btn btn-primary">

                        Download PDF

                    </a>

                    <a th:href="@{/profiles/{id}/edit(id=${profile.id})}"
                       class="btn btn-warning">

                        Edit

                    </a>

                    <a href="/"
                       class="btn btn-secondary">

                        All Profiles

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
